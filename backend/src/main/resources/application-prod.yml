spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://app.cenicast.com}
  cookie:
    secure: true
    same-site: Strict
    domain: ${APP_DOMAIN:app.cenicast.com}

logging:
  level:
    root: WARN
    com.cenicast.lis: INFO
