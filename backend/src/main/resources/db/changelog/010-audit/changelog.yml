databaseChangeLog:
  - logicalFilePath: db/changelog/010-audit/changelog.yml

  - changeSet:
      id: 010-create-audit-events
      author: cenicast
      changes:
        - sqlFile:
            path: 001-create-audit-events.sql
            relativeToChangelogFile: true
            splitStatements: true
            endDelimiter: ";"
            stripComments: false
      rollback:
        - sql:
            sql: "DROP TABLE IF EXISTS audit_events;"
