spring:
  application:
    name: cenicast-lis
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cenicast_lis}
    username: ${DB_USER:cenicast}
    password: ${DB_PASSWORD:cenicast}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /api/v1/docs
  api-docs:
    path: /api/v1/api-docs

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars-long-for-hs256}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 30
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
    domain: ${COOKIE_DOMAIN:localhost}

logging:
  level:
    root: INFO
    com.cenicast.lis: INFO
